name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_os: win
            arch: x86_64
            runtime_os: win
            runtime_arch: x64
            drop_os: windows
            drop_core_supported: true
            drop_core_smoke_import: true
            ext: zip
          - os: windows-11-arm
            artifact_os: win
            arch: aarch64
            runtime_os: win
            runtime_arch: arm64
            drop_os: windows
            # drop_core v1.3.1 has no Windows ARM64 asset; combat falls back to the non-native path.
            drop_core_supported: false
            drop_core_smoke_import: false
            ext: zip
          - os: ubuntu-latest
            artifact_os: linux
            arch: x86_64
            runtime_os: linux
            runtime_arch: x64
            drop_os: linux
            drop_core_supported: true
            drop_core_smoke_import: false
            ext: tar.gz
          - os: ubuntu-latest
            artifact_os: linux
            arch: aarch64
            runtime_os: linux
            runtime_arch: arm64
            drop_os: linux
            drop_core_supported: true
            drop_core_smoke_import: false
            ext: tar.gz
          - os: macos-15-intel
            artifact_os: macos
            arch: x86_64
            runtime_os: osx
            runtime_arch: x64
            drop_os: darwin
            drop_core_supported: true
            drop_core_smoke_import: true
            ext: tar.gz
          - os: macos-latest
            artifact_os: macos
            arch: aarch64
            runtime_os: osx
            runtime_arch: arm64
            drop_os: darwin
            drop_core_supported: true
            drop_core_smoke_import: true
            ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: actions/setup-python@v6
        if: hashFiles('pyproject.toml') != ''
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v8.3.1
        if: hashFiles('pyproject.toml') != ''
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: node tools/check-project.mjs
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm check:py
        if: hashFiles('pyproject.toml') != ''
      - run: pnpm release:dry-run
        if: github.event_name == 'workflow_dispatch'
      - run: pnpm sync:runtime
        if: github.event_name != 'workflow_dispatch'
        env:
          CREATE_MAA_PROJECT_RUNTIME_PLATFORM: ${{ matrix.runtime_os }}-${{ matrix.runtime_arch }}
          GITHUB_TOKEN: ${{ github.token }}
      - name: Download drop_core
        if: github.event_name != 'workflow_dispatch' && matrix.drop_core_supported
        shell: bash
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          args=(--os "${{ matrix.drop_os }}" --arch "${{ matrix.runtime_arch }}")
          if [[ "${{ matrix.drop_core_smoke_import }}" == "true" ]]; then
            args+=(--smoke-import)
          fi
          python tools/ci/download_drop_core.py "${args[@]}"
      - name: Note unsupported drop_core target
        if: github.event_name != 'workflow_dispatch' && matrix.drop_core_supported == false
        shell: bash
        run: echo "[INFO] drop_core is not published for ${{ matrix.drop_os }}-${{ matrix.runtime_arch }}"
      - run: node tools/build-release.mjs
        if: github.event_name != 'workflow_dispatch'
        env:
          CREATE_MAA_PROJECT_RUNTIME_PLATFORM: ${{ matrix.runtime_os }}-${{ matrix.runtime_arch }}
      - name: Verify packaged drop_core
        if: github.event_name != 'workflow_dispatch' && matrix.drop_core_supported
        shell: bash
        run: |
          shopt -s nullglob
          package_dirs=(dist/package-*/)
          if (( ${#package_dirs[@]} == 0 )); then
            echo "[ERR] no release packages were generated for a supported drop_core target"
            exit 1
          fi
          for pkg_dir in "${package_dirs[@]}"; do
            modules=("$pkg_dir"/agent/libs/drop_core*.pyd "$pkg_dir"/agent/libs/drop_core*.so)
            if (( ${#modules[@]} != 1 )); then
              echo "[ERR] expected exactly one drop_core module in $pkg_dir, found ${#modules[@]}"
              exit 1
            fi
            echo "[OK] packaged drop_core: ${modules[0]}"
          done
      - name: Generate manifest cache
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          for pkg_dir in dist/package-*; do
            [ -d "$pkg_dir" ] || continue
            if [ -d "$pkg_dir/data" ]; then
              python tools/ci/generate_manifest_cache.py "$pkg_dir/data" || echo "[WARN] manifest cache generation failed for $pkg_dir"
            fi
          done
      - name: Apply app icon
        if: github.event_name != 'workflow_dispatch' && hashFiles('logo.ico') != ''
        shell: bash
        run: |
          for pkg_dir in dist/package-*; do
            [ -d "$pkg_dir" ] || continue
            gui=$(basename "$pkg_dir" | sed 's/^package-//')
            cp logo.ico "$pkg_dir/logo.ico"

            if [[ "${{ matrix.runtime_os }}" == "win" ]]; then
              if [ ! -f rcedit.exe ]; then
                curl -fsSL https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe -o rcedit.exe
              fi
              exe="$pkg_dir/m9a.exe"
              if [[ -f "$exe" ]]; then
                ./rcedit.exe "$exe" --set-icon logo.ico
                echo "[OK] Applied Windows executable icon: $exe ($gui)"
              else
                echo "[WARN] Windows executable was not found in $pkg_dir; skipped."
              fi
            fi
          done
      - name: Package
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          mkdir -p dist
          shopt -s nullglob
          package_dirs=(dist/package-*/)
          if (( ${#package_dirs[@]} == 0 )); then
            echo "[ERR] no release packages were generated"
            exit 1
          fi
          for pkg_dir in "${package_dirs[@]}"; do
            gui=$(basename "$pkg_dir" | sed 's/^package-//')
            gui_upper=$(echo "$gui" | tr '[:lower:]' '[:upper:]')
            archive="M9A-${{ matrix.artifact_os }}-${{ matrix.arch }}-${GITHUB_REF_NAME}-${gui_upper}.${{ matrix.ext }}"
            (
              cd "$pkg_dir"
              if [[ "${{ matrix.ext }}" == "zip" ]]; then
                7z a "../$archive" .
              else
                tar -czf "../$archive" .
                tar -tzvf "../$archive" > "../$archive.manifest"
                if ! awk '$1 ~ /^-/ && $0 ~ /(^|\/)(m9a|MFAAvalonia|mxu|MaaPiCli|MaaAgentServer|maa-cli|python3?)$/ && $1 !~ /^-..x/ { print; bad=1 } END { exit bad }' "../$archive.manifest"; then
                  echo "[ERR] Unix archive is missing executable permission metadata"
                  exit 1
                fi
                echo "[OK] Unix archive executable metadata smoke passed"
              fi
            )
            rm -rf "$pkg_dir"
          done
      - uses: actions/upload-artifact@v7
        if: github.event_name != 'workflow_dispatch'
        with:
          name: ${{ matrix.artifact_os }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  git_cliff:
    name: Generate release notes
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Generate release notes
        shell: bash
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="2.13.1"
          archive="git-cliff-${version}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir -p "$RUNNER_TEMP/git-cliff"
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v${version}/$archive" -o "$RUNNER_TEMP/$archive"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP/git-cliff"
          git_cliff="$(find "$RUNNER_TEMP/git-cliff" -type f -name git-cliff -perm -111 | head -n 1)"
          if [[ -z "$git_cliff" ]]; then
            echo "[ERR] git-cliff binary was not found after extraction"
            exit 1
          fi
          "$git_cliff" --config .github/cliff.toml --latest --strip header --output CHANGES.md
      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: CHANGES.md

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [package, git_cliff]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release-assets/CHANGES.md
          files: |
            release-assets/*.zip
            release-assets/*.tar.gz
      - name: Dispatch post-release hooks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/dispatches" \
            -f event_type=create-maa-project-release \
            -f client_payload[tag]="$GITHUB_REF_NAME"
