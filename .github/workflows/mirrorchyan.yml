name: mirrorchyan_release

on:
  workflow_dispatch:
    inputs:
      tag:
        default: ""
        required: false
  repository_dispatch:
    types: [mirrorchyan-upload]
  release:
    types: [released]

jobs:
  mirrorchyan_mfa:
    runs-on: ubuntu-latest
    # Mirror酱为第三方分发服务，新项目默认关闭
    # 若有需要请联系 Mirror酱 开通，直接自行开启是无法使用的
    # https://mirrorchyan.com/
    if: ${{ github.repository_owner == 'MAA1999' }}
    strategy:
      fail-fast: false
      matrix:
        os: [win, macos, linux]
        arch: [aarch64, x86_64]
    steps:
      - uses: MirrorChyan/uploading-action@v1
        with:
          filetype: latest-release
          filename: ${{ format('M9A-{0}-{1}-*-MFAA*', matrix.os, matrix.arch) }}
          mirrorchyan_rid: M9A
          tag: ${{ inputs.tag || github.event.client_payload.tag }}

          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}

          owner: MAA1999
          repo: M9A
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upload_token: ${{ secrets.MirrorChyanUploadToken }}

  mirrorchyan_mxu:
    runs-on: ubuntu-latest
    # Mirror酱为第三方分发服务，新项目默认关闭
    # 若有需要请联系 Mirror酱 开通，直接自行开启是无法使用的
    # https://mirrorchyan.com/
    if: ${{ github.repository_owner == 'MAA1999' }}
    strategy:
      fail-fast: false
      matrix:
        os: [win, macos, linux]
        arch: [aarch64, x86_64]
    steps:
      - uses: MirrorChyan/uploading-action@v1
        if: ${{ matrix.os != 'linux' || matrix.arch != 'aarch64' }}
        with:
          filetype: latest-release
          filename: ${{ format('M9A-{0}-{1}-*-MXU*', matrix.os, matrix.arch) }}
          mirrorchyan_rid: M9A-MXU
          tag: ${{ inputs.tag || github.event.client_payload.tag }}

          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}

          owner: MAA1999
          repo: M9A
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upload_token: ${{ secrets.MirrorChyanUploadToken }}
