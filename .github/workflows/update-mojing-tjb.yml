name: Update Mojing TJB Image

on:
  schedule:
    - cron: "30 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.repository == 'MAA1999/M9A'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Download latest image
        run: |
          set -euo pipefail

          target="assets/resource/announcement/images/mojing_tjb.jpg"
          tmp="$(mktemp)"

          curl -fsSL \
            --retry 3 \
            --retry-delay 5 \
            --output "$tmp" \
            "https://mojing.chat/api/tjb"

          if ! file "$tmp" | grep -q "JPEG image data"; then
            echo "Downloaded file is not a JPEG image"
            file "$tmp"
            exit 1
          fi

          mkdir -p "$(dirname "$target")"
          mv "$tmp" "$target"

      - name: Commit and push changes
        run: |
          set -euo pipefail

          git add assets/resource/announcement/images/mojing_tjb.jpg

          if git diff --cached --quiet -- assets/resource/announcement/images/mojing_tjb.jpg; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: update mojing tjb image" -m "[skip changelog]"
          git push
